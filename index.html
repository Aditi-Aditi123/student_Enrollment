<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Enrollment Form</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <style>
    body {
      background: #eef2f7;
    }
    .card {
      border-radius: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .card-header {
      background: #0d6efd;
      color: white;
      border-radius: 14px 14px 0 0 !important;
    }
    .btn {
      min-width: 100px;
    }
  </style>
</head>
<body>

<div class="container mt-5">
  <div class="card mx-auto" style="max-width: 650px;">

    <div class="card-header text-center py-3">
      <h4 class="mb-0">🎓 Student Enrollment Form</h4>
      <small>STUDENT-TABLE | SCHOOL-DB</small>
    </div>

    <div class="card-body p-4">

      <div class="mb-3">
        <label for="rollNo" class="form-label fw-bold">
          Roll No <span class="text-danger">*</span>
        </label>
        <input
          type="text"
          class="form-control"
          id="rollNo"
          placeholder="Enter Roll Number"
        />
      </div>

      <div class="mb-3">
        <label for="fullName" class="form-label fw-bold">
          Full Name <span class="text-danger">*</span>
        </label>
        <input
          type="text"
          class="form-control"
          id="fullName"
          placeholder="Enter Full Name"
          disabled
        />
      </div>

      <div class="mb-3">
        <label for="className" class="form-label fw-bold">
          Class <span class="text-danger">*</span>
        </label>
        <input
          type="text"
          class="form-control"
          id="className"
          placeholder="e.g. 10-A"
          disabled
        />
      </div>

      <div class="mb-3">
        <label for="birthDate" class="form-label fw-bold">
          Birth Date <span class="text-danger">*</span>
        </label>
        <input
          type="date"
          class="form-control"
          id="birthDate"
          disabled
        />
      </div>

      <div class="mb-3">
        <label for="address" class="form-label fw-bold">
          Address <span class="text-danger">*</span>
        </label>
        <textarea
          class="form-control"
          id="address"
          rows="2"
          placeholder="Enter Address"
          disabled
        ></textarea>
      </div>

      <div class="mb-4">
        <label for="enrollDate" class="form-label fw-bold">
          Enrollment Date <span class="text-danger">*</span>
        </label>
        <input
          type="date"
          class="form-control"
          id="enrollDate"
          disabled
        />
      </div>

      <!-- Status Message Box -->
      <div id="msgBox" class="alert d-none mb-3"></div>

      <!-- Buttons -->
      <div class="d-flex justify-content-center gap-3">
        <button
          class="btn btn-success"
          id="saveBtn"
          disabled
          onclick="saveData()"
        >💾 Save</button>

        <button
          class="btn btn-warning"
          id="updateBtn"
          disabled
          onclick="updateData()"
        >✏️ Update</button>

        <button
          class="btn btn-secondary"
          id="resetBtn"
          disabled
          onclick="resetForm()"
        >🔄 Reset</button>
      </div>

    </div>
  </div>
</div>

  <!-- jQuery — load first -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <!-- JPDB Commons Library — load second -->
  <script src="https://login2explore.com/jpdb/resources/js/0.0.4/jpdb-commons.js"></script>
  <!-- Config file (has your token) — load third -->
  <script src="js/config.js"></script>
  <!-- Your logic — load last -->
  <script src="js/index.js"></script>

</body>
</html>
